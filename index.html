<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>No Regrets — Recruitment Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Special+Gothic+Expanded+One&display=swap" rel="stylesheet">
<style>
  :root {
    /* No Regrets Brand Palette — Neutrals */
    --black: #0F0F0F;          /* deep black — primary bg */
    --dark: #1C1C1A;           /* near-black surface */
    --charcoal: #2C2C2A;       /* charcoal dark grey */
    --mid: #3A3A37;            /* mid surface */
    --card: #232320;           /* card bg */
    --border: #3E3E3A;         /* border */
    --cool-grey: #C8CBCB;      /* cool light grey */
    --warm-grey: #8C8C84;      /* warm muted grey — body text */
    --linen: #D4C4A8;          /* warm sand / linen — primary accent */
    --linen-d: #2A2518;        /* linen dark bg tint */
    --cream: #EDE9E1;          /* off-white / cream — headings on dark */
    --white: #F5F2EC;          /* near-white */
    /* Accent colours */
    --teal: #1F6B75;           /* teal — primary interactive accent */
    --teal-l: #4FA8B4;         /* teal light — text on dark */
    --teal-d: #0D2E32;         /* teal dark bg tint */
    --terra: #C85A3A;          /* terracotta — warning / fail */
    --terra-l: #E8876A;        /* terracotta light */
    --terra-d: #2E1510;        /* terracotta dark bg tint */
    /* Semantic — kept from original for pass/fail logic */
    --green: #4A8A5A;          /* advance green */
    --green-d: #0E1A12;
    --green-l: #7AB888;
    --red: var(--terra);       /* map red → terracotta */
    --red-d: var(--terra-d);
    --amber: #B89040;          /* warm amber — borderline */
    --amber-d: #201800;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; }
  body { background: var(--black); color: var(--cream); font-family: 'Special Gothic Expanded One', sans-serif; font-size: 13px; display: flex; flex-direction: column; }

  /* ── HEADER ── */
  .header { background: var(--dark); border-bottom: 1px solid var(--linen); padding: 14px 16px 12px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .logo { font-family: 'Special Gothic Expanded One', sans-serif; font-size: 12px; color: var(--white); letter-spacing: 2px; text-transform: uppercase; }
  .logo span { color: var(--linen); font-size: 10px; letter-spacing: 1px; display: block; margin-top: 2px; }

  /* ── SCROLL AREA ── */
  .scroll-area { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 14px 14px 80px; }

  /* ── BOTTOM TAB BAR ── */
  .tab-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--dark); border-top: 1px solid var(--linen); display: flex; z-index: 100; flex-shrink: 0; }
  .tab-btn { flex: 1; background: transparent; border: none; color: var(--warm-grey); padding: 12px 8px 14px; cursor: pointer; font-family: 'Special Gothic Expanded One', sans-serif; font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; display: flex; flex-direction: column; align-items: center; gap: 4px; transition: color 0.15s; }
  .tab-btn .tab-icon { font-size: 18px; line-height: 1; }
  .tab-btn.active { color: var(--linen); border-top: 2px solid var(--linen); margin-top: -1px; }
  .tab-btn:hover { color: var(--linen); }

  /* ── VIEWS ── */
  .view { display: none; }
  .view.active { display: block; }

  /* ── DASHBOARD ── */
  .dash-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px; }
  .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 2px; padding: 14px 12px; text-align: center; border-top: 2px solid var(--linen); }
  .stat-card .num { font-family: 'Special Gothic Expanded One', sans-serif; font-size: 28px; font-weight: 400; color: var(--linen); line-height: 1; }
  .stat-card .lbl { font-family: 'Special Gothic Expanded One', sans-serif; font-size: 8px; color: var(--warm-grey); margin-top: 4px; text-transform: uppercase; letter-spacing: 1px; }
  .stat-card.green { border-top-color: var(--green); }
  .stat-card.green .num { color: var(--green-l); }
  .stat-card.red { border-top-color: var(--terra); }
  .stat-card.red .num { color: var(--terra-l); }
  .stat-card.amber { border-top-color: var(--amber); }
  .stat-card.amber .num { color: var(--amber); }
  .stat-card.blue { border-top-color: var(--teal); }
  .stat-card.blue .num { color: var(--teal-l); }

  .dash-section { background: var(--card); border: 1px solid var(--border); border-radius: 2px; margin-bottom: 12px; overflow: hidden; }
  .dash-section-header { background: var(--charcoal); padding: 8px 12px; font-family: 'Special Gothic Expanded One', sans-serif; font-size: 8px; color: var(--linen); letter-spacing: 2px; text-transform: uppercase; border-bottom: 1px solid var(--border); }

  /* Dashboard candidate rows — card style on mobile */
  .dash-candidate-card { padding: 12px; border-bottom: 1px solid var(--border); cursor: pointer; active-opacity: 0.7; }
  .dash-candidate-card:last-child { border-bottom: none; }
  .dash-candidate-card:active { background: var(--mid); }
  .dcc-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
  .dcc-name { font-size: 12px; font-weight: 700; color: var(--white); }
  .dcc-rank { font-family: 'Special Gothic Expanded One', sans-serif; font-size: 9px; color: var(--linen); }
  .dcc-bottom { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .dcc-handle { font-size: 10px; color: var(--linen); flex: 1; }
  .dcc-empty { font-size: 12px; color: var(--warm-grey); text-align: center; padding: 16px; }

  /* ── PIPELINE CONTROLS ── */
  .pipeline-controls { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }
  .search-input { background: var(--card); border: 1px solid var(--border); color: var(--cream); padding: 10px 12px; border-radius: 2px; font-size: 13px; font-family: 'Special Gothic Expanded One', sans-serif; width: 100%; }
  .search-input:focus { outline: none; border-color: var(--linen); }
  .search-input::placeholder { color: var(--warm-grey); }
  .controls-row { display: flex; gap: 8px; align-items: center; }
  .filter-select { background: var(--card); border: 1px solid var(--border); color: var(--cream); padding: 8px 8px; border-radius: 2px; font-size: 11px; font-family: 'Special Gothic Expanded One', sans-serif; cursor: pointer; flex: 1; }
  .filter-select:focus { outline: none; border-color: var(--linen); }
  .count-badge { background: var(--charcoal); border: 1px solid var(--border); color: var(--warm-grey); padding: 8px 10px; border-radius: 2px; font-size: 10px; font-family: 'Special Gothic Expanded One', sans-serif; white-space: nowrap; }

  /* ── CANDIDATE CARDS (pipeline) ── */
  .candidate-card { background: var(--card); border: 1px solid var(--border); border-radius: 2px; margin-bottom: 8px; cursor: pointer; overflow: hidden; }
  .candidate-card:active { background: var(--mid); }

  /* Top row — name + status */
  .cc-top { display: flex; align-items: center; justify-content: space-between; gap: 8px; padding: 10px 12px 8px; }
  .cc-name { font-size: 13px; font-weight: 700; color: var(--white); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* Handle row */
  .cc-handle { font-size: 10px; color: var(--linen); padding: 0 12px 8px; }

  /* Data strip — 4 equal columns with labels */
  .cc-strip { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; border-top: 1px solid var(--border); }
  .cc-cell { padding: 7px 0; text-align: center; border-right: 1px solid var(--border); }
  .cc-cell:last-child { border-right: none; }
  .cc-cell-label { font-family: 'Special Gothic Expanded One', sans-serif; font-size: 7px; color: var(--warm-grey); text-transform: uppercase; letter-spacing: 1px; display: block; margin-bottom: 3px; }
  .cc-cell-value { font-family: 'Special Gothic Expanded One', sans-serif; font-size: 13px; color: var(--linen); display: block; line-height: 1; }
  .cc-cell-value.small { font-size: 10px; }
  .cc-cell-value.eng-yes-v { color: var(--teal-l); }
  .cc-cell-value.eng-no-v { color: var(--terra-l); }
  .cc-cell-value.eng-na-v { color: var(--warm-grey); }
  .cc-cell-value.decision-advance { color: var(--green-l); font-size: 10px; }
  .cc-cell-value.decision-borderline { color: var(--amber); font-size: 10px; }
  .cc-cell-value.decision-decline { color: var(--terra-l); font-size: 10px; }
  .cc-cell-value.decision-pending { color: var(--warm-grey); font-size: 10px; }
  .cc-exp { font-size: 10px; color: var(--warm-grey); }
  .cc-decision { font-size: 10px; font-weight: 700; margin-left: auto; }
  .cc-decision.advance { color: var(--green-l); }
  .cc-decision.borderline { color: var(--amber); }
  .cc-decision.decline { color: var(--terra-l); }

  /* ── BADGES ── */
  .rank-badge { display: inline-block; background: var(--charcoal); color: var(--linen); font-family: 'Special Gothic Expanded One', sans-serif; font-size: 9px; padding: 2px 6px; border-radius: 2px; border: 1px solid var(--border); }
  .status-badge { display: inline-block; padding: 3px 7px; border-radius: 2px; font-size: 8px; white-space: nowrap; font-family: 'Special Gothic Expanded One', sans-serif; letter-spacing: 0.5px; text-transform: uppercase; border: 1px solid; }
  .status-not-contacted { background: var(--charcoal); color: var(--warm-grey); border-color: var(--border); }
  .status-dm-sent { background: var(--linen-d); color: var(--linen); border-color: var(--linen); }
  .status-email-sent { background: var(--teal-d); color: var(--teal-l); border-color: var(--teal); }
  .status-interview-scheduled { background: #1A2020; color: #7ABBB8; border-color: var(--teal); }
  .status-interviewed { background: var(--amber-d); color: var(--amber); border-color: var(--amber); }
  .status-advanced { background: var(--green-d); color: var(--green-l); border-color: var(--green); }
  .status-declined { background: var(--terra-d); color: var(--terra-l); border-color: var(--terra); }
  .status-borderline { background: #1E1600; color: var(--amber); border-color: var(--amber); }
  .band-strong { color: var(--teal-l); font-size: 8px; font-family: 'Special Gothic Expanded One', sans-serif; text-transform: uppercase; }
  .band-possible { color: var(--linen); font-size: 8px; font-family: 'Special Gothic Expanded One', sans-serif; text-transform: uppercase; }
  .eng-badge { display: inline-block; font-family: 'Special Gothic Expanded One', sans-serif; font-size: 8px; padding: 2px 6px; border-radius: 2px; border: 1px solid; }
  .eng-yes { background: var(--teal-d); color: var(--teal-l); border-color: var(--teal); }
  .eng-basic { background: var(--linen-d); color: var(--linen); border-color: var(--linen); }
  .eng-no { background: var(--terra-d); color: var(--terra-l); border-color: var(--terra); }
  .eng-na { background: var(--charcoal); color: var(--warm-grey); border-color: var(--border); }

  /* ── MODAL — full screen sheet ── */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(10,10,8,0.6); z-index: 200; }
  .modal-overlay.open { display: block; }
  .modal { background: var(--dark); border-top: 2px solid var(--linen); border-radius: 0; width: 100%; position: fixed; bottom: 0; left: 0; right: 0; max-height: 92vh; display: flex; flex-direction: column; transform: translateY(100%); transition: transform 0.3s ease; }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 10px auto 0; flex-shrink: 0; }
  .modal-header { background: var(--charcoal); padding: 12px 16px; display: flex; align-items: flex-start; justify-content: space-between; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .modal-title { font-family: 'Special Gothic Expanded One', sans-serif; font-size: 13px; color: var(--white); letter-spacing: 0.5px; line-height: 1.3; flex: 1; padding-right: 8px; }
  .modal-subtitle { font-family: 'Special Gothic Expanded One', sans-serif; font-size: 10px; color: var(--linen); margin-top: 3px; }
  .modal-close { background: none; border: 1px solid var(--border); color: var(--warm-grey); width: 30px; height: 30px; border-radius: 2px; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .modal-body { padding: 14px 16px; overflow-y: auto; -webkit-overflow-scrolling: touch; flex: 1; }

  .modal-status-row { display: flex; gap: 10px; align-items: center; margin-bottom: 14px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
  .modal-status-row label { font-family: 'Special Gothic Expanded One', sans-serif; font-size: 8px; color: var(--warm-grey); text-transform: uppercase; letter-spacing: 1.5px; white-space: nowrap; }
  .status-select { background: var(--card); border: 1px solid var(--linen); color: var(--linen); padding: 8px 10px; border-radius: 2px; font-family: 'Special Gothic Expanded One', sans-serif; font-size: 12px; cursor: pointer; flex: 1; }

  /* Q blocks */
  .q-block { margin-bottom: 8px; border: 1px solid var(--border); border-radius: 2px; overflow: hidden; }
  .q-header { display: flex; align-items: center; gap: 8px; padding: 10px 12px; background: var(--charcoal); border-bottom: 1px solid var(--border); }
  .q-num { font-family: 'Special Gothic Expanded One', sans-serif; font-size: 12px; color: var(--linen); min-width: 22px; }
  .q-area { font-family: 'Special Gothic Expanded One', sans-serif; font-size: 10px; color: var(--cream); flex: 1; }
  .q-nn { font-family: 'Special Gothic Expanded One', sans-serif; font-size: 8px; color: var(--terra-l); background: var(--terra-d); padding: 2px 6px; border-radius: 2px; border: 1px solid var(--terra); text-transform: uppercase; white-space: nowrap; }
  .q-body { padding: 10px 12px; background: var(--card); }
  .q-text { font-family: 'Special Gothic Expanded One', sans-serif; font-size: 10px; color: var(--warm-grey); font-style: italic; margin-bottom: 10px; line-height: 1.5; }
  .q-controls { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
  .pf-btn { padding: 9px 0; border-radius: 2px; border: 1px solid; font-family: 'Special Gothic Expanded One', sans-serif; font-size: 10px; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; background: transparent; transition: all 0.12s; flex: 1; text-align: center; min-width: 60px; }
  .pf-pass { border-color: var(--green); color: var(--green-l); }
  .pf-pass.selected, .pf-pass:active { background: var(--green); color: var(--white); }
  .pf-fail { border-color: var(--terra); color: var(--terra-l); }
  .pf-fail.selected, .pf-fail:active { background: var(--terra); color: var(--white); }
  .pf-none { border-color: var(--border); color: var(--warm-grey); flex: 0; min-width: 44px; }
  .pf-none.selected { background: var(--mid); color: var(--cream); }
  .q-note { width: 100%; margin-top: 8px; background: var(--dark); border: 1px solid var(--border); color: var(--cream); padding: 8px 10px; border-radius: 2px; font-family: 'Special Gothic Expanded One', sans-serif; font-size: 11px; resize: none; height: 36px; }
  .q-note:focus { outline: none; border-color: var(--linen); }

  /* Decision banner */
  .decision-banner { padding: 12px 14px; border-radius: 2px; margin-top: 12px; }
  .decision-banner.advance { background: var(--green-d); border: 1px solid var(--green); }
  .decision-banner.borderline { background: var(--amber-d); border: 1px solid var(--amber); }
  .decision-banner.decline { background: var(--terra-d); border: 1px solid var(--terra); }
  .decision-banner.pending { background: var(--charcoal); border: 1px solid var(--border); }
  .decision-label { font-family: 'Special Gothic Expanded One', sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 0.5px; display: block; margin-bottom: 3px; }
  .decision-banner.advance .decision-label { color: var(--green-l); }
  .decision-banner.borderline .decision-label { color: var(--amber); }
  .decision-banner.decline .decision-label { color: var(--terra-l); }
  .decision-banner.pending .decision-label { color: var(--warm-grey); }
  .decision-detail { font-family: 'Special Gothic Expanded One', sans-serif; font-size: 10px; color: var(--warm-grey); }

  .modal-actions { display: flex; gap: 8px; margin-top: 14px; padding-bottom: 8px; }
  .save-btn { background: var(--teal); color: var(--white); border: none; padding: 13px 0; border-radius: 2px; font-family: 'Special Gothic Expanded One', sans-serif; font-size: 11px; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; flex: 1; }
  .save-btn:active { background: var(--teal-l); }
  .cancel-btn { background: transparent; color: var(--warm-grey); border: 1px solid var(--border); padding: 13px 18px; border-radius: 2px; font-family: 'Special Gothic Expanded One', sans-serif; font-size: 11px; text-transform: uppercase; cursor: pointer; }

  /* Score strip */
  .score-strip { display: flex; gap: 4px; margin-bottom: 10px; }
  .score-pip { flex: 1; height: 28px; border-radius: 2px; display: flex; align-items: center; justify-content: center; font-family: 'Special Gothic Expanded One', sans-serif; font-size: 9px; border: 1px solid var(--border); }
  .score-pip.pass { background: var(--green-d); color: var(--green-l); border-color: var(--green); }
  .score-pip.fail { background: var(--terra-d); color: var(--terra-l); border-color: var(--terra); }
  .score-pip.none { background: var(--charcoal); color: var(--warm-grey); }

  /* Toast */
  .toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: var(--teal-d); border: 1px solid var(--teal); color: var(--teal-l); padding: 10px 20px; border-radius: 2px; font-family: 'Special Gothic Expanded One', sans-serif; font-size: 11px; letter-spacing: 1px; z-index: 999; opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap; }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<div class="header">
  <div class="logo">NO REGRETS <span>· Recruitment Tracker</span></div>
  <div style="display:flex;align-items:center;gap:10px;">
    <div id="recruiter-chip" style="font-family:'Special Gothic Expanded One',sans-serif;font-size:9px;color:var(--warm-grey);letter-spacing:1px;text-transform:uppercase;cursor:pointer;" onclick="changeRecruiter()" title="Tap to change name"></div>
  </div>
</div>

<div class="scroll-area">

  <!-- DASHBOARD VIEW -->
  <div class="view active" id="view-dashboard">
    <div class="dash-grid" id="dash-stats"></div>
    <div class="dash-section">
      <div class="dash-section-header">Interviewed</div>
      <div id="dash-interviewed"></div>
    </div>
    <div class="dash-section">
      <div class="dash-section-header">Advanced to Portfolio Review</div>
      <div id="dash-advanced"></div>
    </div>
  </div>

  <!-- PIPELINE VIEW -->
  <div class="view" id="view-pipeline">
    <div class="pipeline-controls">
      <input class="search-input" type="text" id="search-input" placeholder="Search name or handle..." oninput="renderPipeline()">
      <div class="controls-row">
        <select class="filter-select" id="filter-status" onchange="renderPipeline()">
          <option value="">All statuses</option>
          <option value="Not Contacted">Not Contacted</option>
          <option value="DM Sent">DM Sent</option>
          <option value="Email Sent">Email Sent</option>
          <option value="Interview Scheduled">Interview Scheduled</option>
          <option value="Interviewed">Interviewed</option>
          <option value="Advanced">Advanced</option>
          <option value="Borderline">Borderline</option>
          <option value="Declined">Declined</option>
        </select>
        <select class="filter-select" id="filter-band" onchange="renderPipeline()">
          <option value="">All bands</option>
          <option value="STRONG">Strong</option>
          <option value="POSSIBLE">Possible</option>
        </select>
        <span class="count-badge" id="count-badge">27</span>
      </div>
    </div>
    <div id="pipeline-cards"></div>
  </div>

</div>

<!-- BOTTOM TAB BAR -->
<nav class="tab-bar">
  <button class="tab-btn active" id="tab-dashboard" onclick="showView('dashboard', this)">
    <span class="tab-icon">◈</span>
    Dashboard
  </button>
  <button class="tab-btn" id="tab-pipeline" onclick="showView('pipeline', this)">
    <span class="tab-icon">≡</span>
    Pipeline
  </button>
</nav>

<!-- INTERVIEW MODAL — bottom sheet -->
<div class="modal-overlay" id="modal" onclick="handleOverlayClick(event)">
  <div class="modal" id="modal-inner">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <div>
        <div class="modal-title" id="modal-name"></div>
        <div class="modal-subtitle" id="modal-sub"></div>
      </div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-status-row">
        <label>Status</label>
        <select class="status-select" id="modal-status-select">
          <option>Not Contacted</option>
          <option>DM Sent</option>
          <option>Email Sent</option>
          <option>Interview Scheduled</option>
          <option>Interviewed</option>
          <option>Advanced</option>
          <option>Borderline</option>
          <option>Declined</option>
        </select>
      </div>
      <div class="score-strip" id="score-strip"></div>
      <div id="q-blocks"></div>
      <div class="decision-banner pending" id="decision-banner">
        <span class="decision-label" id="decision-label">Score questions to calculate decision</span>
        <span class="decision-detail" id="decision-detail"></span>
      </div>
      <div class="modal-actions">
        <button class="cancel-btn" onclick="closeModal()">Cancel</button>
        <button id="save-btn" class="save-btn" onclick="saveCandidate()">Save</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast">Saved ✓</div>

<script>
const QUESTIONS = [
  { id:'q1', area:'Warm-Up · Sensitivity', nn:false, text:'What is the most meaningful tattoo you have ever done — and why did it matter to you?' },
  { id:'q2', area:'Creative Autonomy', nn:true,  text:'Walk me through a time a client gave you almost nothing to work with. How did you turn a vague brief into a finished piece?' },

// ── RECRUITER IDENTITY ──────────────────────────────────────────────────────
let recruiterName = '';

function ensureRecruiter() {
  if (recruiterName) return Promise.resolve();
  return new Promise(resolve => {
    const overlay = document.createElement('div');
    overlay.style.cssText = 'position:fixed;inset:0;background:rgba(10,10,8,0.95);z-index:999;display:flex;align-items:center;justify-content:center;padding:24px;';

        <div style="font-family:'Special Gothic Expanded One',sans-serif;font-size:9px;color:#8C8C84;letter-spacing:1px;text-transform:uppercase;margin-bottom:20px;">Recruitment Tracker</div>
        <div style="font-family:'Special Gothic Expanded One',sans-serif;font-size:10px;color:#EDE9E1;margin-bottom:10px;">Who are you?</div>
        <input id="recruiter-input" type="text" placeholder="Your name..." style="width:100%;background:#232320;border:1px solid #3E3E3A;color:#EDE9E1;padding:12px;border-radius:2px;font-family:'Special Gothic Expanded One',sans-serif;font-size:13px;margin-bottom:14px;outline:none;">
        <button id="recruiter-btn" style="width:100%;background:#1F6B75;color:#F5F2EC;border:none;padding:13px;border-radius:2px;font-family:'Special Gothic Expanded One',sans-serif;font-size:11px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;">Enter Tracker</button>
      </div>`;
    document.body.appendChild(overlay);
    const input = overlay.querySelector('#recruiter-input');
    const btn = overlay.querySelector('#recruiter-btn');
    input.focus();
    const confirm = () => {
      const val = input.value.trim();
      if (!val) { input.style.borderColor='#C85A3A'; return; }
      recruiterName = val;
      localStorage.setItem('nr_recruiter_name', val);

// ── STATE ──────────────────────────────────────────────────────────────────
let state = {};
let currentId = null;

async function loadState() {
  try {
    const res = await fetch(`${FIREBASE_URL}/state.json`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    if (data && typeof data === 'object') {
      state = {};
      // Firebase returns keys as strings — store as strings throughout
      Object.keys(data).forEach(k => {
        state[k] = data[k];
      });
    } else {
      state = {};
    }
  } catch(e) {
    console.warn('Firebase load failed:', e);
    state = {};
  }
  // Fill defaults only for candidates not yet in Firebase
  CANDIDATES.forEach(c => {
    const key = String(c.id);
    if (!state[key] || typeof state[key] !== 'object') {
      state[key] = { status:'Not Contacted', scores:{}, notes:{}, decision:'pending', updatedBy:'', updatedAt:'' };
    }
    // Ensure sub-objects always exist
    if (!state[key].scores) state[key].scores = {};
    if (!state[key].notes) state[key].notes = {};
  });
}

async function saveSingleCandidate(id) {
  const key = String(id);
  try {
    const res = await fetch(`${FIREBASE_URL}/state/${key}.json`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(state[key])
    });
    if (!res.ok) {
      const err = await res.text();
      console.error('Firebase save error:', err);
      showToast('Save failed — check Firebase rules');
      return false;
    }
    return true;
  } catch(e) {
    console.error('Firebase save failed:', e);
    showToast('Save failed — check connection');
    return false;
  }
}

// ── UTILS ──────────────────────────────────────────────────────────────────
function engLabel(e) {
  const l = e.toLowerCase();
  if (l === 'no') return 'No';
  if (l.includes('not stated') || l.includes('us #')) return 'Not stated';
  return 'Yes';
}

function engClass(e) {
  const l = e.toLowerCase();
  if (l === 'no') return 'eng-no';
  if (l.includes('not stated') || l.includes('us #')) return 'eng-na';
  return 'eng-yes';
}

function statusClass(s) {
  const map = {
    'Not Contacted':'not-contacted','DM Sent':'dm-sent','Email Sent':'email-sent',
    'Interview Scheduled':'interview-scheduled','Interviewed':'interviewed',
    'Advanced':'advanced','Declined':'declined','Borderline':'borderline'
  };
  return 'status-' + (map[s] || 'not-contacted');
}

function calcDecision(id) {
  const s = state[String(id)];
  if (!s) return 'pending';
  const scores = s.scores;
  const answered = QUESTIONS.filter(q => scores[q.id] === 'pass' || scores[q.id] === 'fail');
  if (answered.length === 0) return 'pending';
  const passes = QUESTIONS.filter(q => scores[q.id] === 'pass').length;
  const nnFail = QUESTIONS.filter(q => q.nn && scores[q.id] === 'fail').length;
  if (nnFail > 0) return 'decline';
  if (passes >= 5) return 'advance';
  if (passes === 4) return 'borderline';
  return 'decline';
}

          </div>

  const advanced = CANDIDATES.filter(c => state[String(c.id)]?.status === 'Advanced');
  document.getElementById('dash-advanced').innerHTML = advanced.length === 0
    ? `<div class="dcc-empty">No candidates advanced yet</div>`
    : advanced.map(c => `<div class="dash-candidate-card" onclick="openModal(${c.id})">
        <div class="dcc-top">
          <span class="dcc-name">${c.name}</span>
          <span style="font-weight:700;font-size:13px;color:var(--linen)">${c.score}</span>

          <span style="font-size:10px;color:var(--warm-grey)">${c.exp}y exp</span>

}

// ── PIPELINE ───────────────────────────────────────────────────────────────
function renderPipeline(resetFilter) {
  if (resetFilter) {
    document.getElementById('filter-status').value = '';
    document.getElementById('filter-band').value = '';
    document.getElementById('search-input').value = '';
  }
  const search = (document.getElementById('search-input')?.value || '').toLowerCase();
  const filterStatus = document.getElementById('filter-status')?.value || '';
  const filterBand = document.getElementById('filter-band')?.value || '';

  const filtered = CANDIDATES.filter(c => {
    const matchSearch = !search || c.name.toLowerCase().includes(search) || c.handle.toLowerCase().includes(search);
    const matchStatus = !filterStatus || (state[String(c.id)]?.status || 'Not Contacted') === filterStatus;
    const matchBand = !filterBand || c.band === filterBand;
    return matchSearch && matchStatus && matchBand;
  });

  const badge = document.getElementById('count-badge');
  if (badge) badge.textContent = filtered.length;

  document.getElementById('pipeline-cards').innerHTML = filtered.map(c => {
    const s = state[String(c.id)] || {};
    const status = s.status || 'Not Contacted';
    const d = calcDecision(c.id);
    const answered = QUESTIONS.filter(q => s.scores?.[q.id] === 'pass' || s.scores?.[q.id] === 'fail').length;
    const engV = engClass(c.english) === 'eng-yes' ? 'eng-yes-v' : engClass(c.english) === 'eng-no' ? 'eng-no-v' : 'eng-na-v';
    const engTxt = engLabel(c.english);
    const dLabel = d==='advance'?'ADVANCE':d==='borderline'?'BORDER':d==='decline'?'DECLINE':'—';
    const dClass = d==='advance'?'decision-advance':d==='borderline'?'decision-borderline':d==='decline'?'decision-decline':'decision-pending';
    const bandTxt = c.band === 'STRONG' ? 'Strong' : 'Possible';
    const bandColor = c.band === 'STRONG' ? 'var(--teal-l)' : 'var(--linen)';
    return `<div class="candidate-card" onclick="openModal(${c.id})">
      <div class="cc-top">
        <div class="cc-name">${c.name}</div>
        <span class="status-badge ${statusClass(status)}">${status}</span>
      </div>
      <div class="cc-handle">${c.handle}</div>
      <div class="cc-strip">
        <div class="cc-cell">
          <span class="cc-cell-label">Rank</span>
          <span class="cc-cell-value">#${c.rank}</span>
        </div>
        <div class="cc-cell">
          <span class="cc-cell-label">Score</span>
          <span class="cc-cell-value">${c.score}</span>
        </div>
        <div class="cc-cell">
          <span class="cc-cell-label">English</span>
          <span class="cc-cell-value small ${engV}">${engTxt}</span>
        </div>
        <div class="cc-cell">
          <span class="cc-cell-label">${answered > 0 ? 'Decision' : 'Band'}</span>
          <span class="cc-cell-value small ${answered > 0 ? dClass : ''}" style="${answered === 0 ? 'color:'+bandColor : ''}">${answered > 0 ? dLabel : bandTxt}</span>
        </div>
      </div>
      ${s.updatedBy ? `<div style="padding:5px 12px;background:var(--charcoal);font-family:'Special Gothic Expanded One',sans-serif;font-size:8px;color:var(--warm-grey);letter-spacing:0.5px;">Updated by ${s.updatedBy}${s.updatedAt ? ' · ' + new Date(s.updatedAt).toLocaleDateString('en-GB',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'}) : ''}</div>` : ''}
    </div>`;
  }).join('');
}

// ── MODAL ──────────────────────────────────────────────────────────────────
function openModal(id) {
  currentId = id;
  const c = CANDIDATES.find(x => x.id === id);
  const s = state[String(id)] || {};

  document.getElementById('modal-name').textContent = `${c.name} — ${c.handle}`;
  const updatedInfo = s.updatedBy ? ` · Updated by ${s.updatedBy} ${s.updatedAt ? '· ' + new Date(s.updatedAt).toLocaleDateString('en-GB', {day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'}) : ''}` : '';
  document.getElementById('modal-sub').textContent = `Rank #${c.rank} · Score ${c.score} · ${c.band} · ${c.exp} years${updatedInfo}`;
  document.getElementById('modal-status-select').value = s.status || 'Not Contacted';

  // Score strip
  document.getElementById('score-strip').innerHTML = QUESTIONS.map(q => {
    const v = s.scores?.[q.id] || 'none';
    return `<div class="score-pip ${v}" title="Q${q.id.replace('q','')} ${q.area}">${q.id.replace('q','Q')}</div>`;
  }).join('');

  // Q blocks
  document.getElementById('q-blocks').innerHTML = QUESTIONS.map(q => {
    const val = s.scores?.[q.id] || 'none';
    const note = s.notes?.[q.id] || '';
    return `<div class="q-block">
      <div class="q-header">
        <span class="q-num">Q${q.id.replace('q','')}</span>
        <span class="q-area">${q.area}</span>
        ${q.nn ? '<span class="q-nn">NON-NEGOTIABLE</span>' : ''}
      </div>
      <div class="q-body">
        <div class="q-text">"${q.text}"</div>
        <div class="q-controls">
          <button class="pf-btn pf-pass ${val==='pass'?'selected':''}" onclick="setScore('${q.id}','pass')">PASS</button>
          <button class="pf-btn pf-fail ${val==='fail'?'selected':''}" onclick="setScore('${q.id}','fail')">FAIL</button>
          <button class="pf-btn pf-none ${val==='none'?'selected':''}" onclick="setScore('${q.id}','none')">—</button>
          <textarea class="q-note" id="note-${q.id}" placeholder="Notes…">${note}</textarea>
        </div>
      </div>
    </div>`;
  }).join('');

  updateDecisionBanner();
  document.getElementById('modal').classList.add('open');
}

function setScore(qid, val) {
  if (!state[String(currentId)]) state[String(currentId)] = { status:'Not Contacted', scores:{}, notes:{}, decision:'pending' };
  state[String(currentId)].scores[qid] = val;

  // Update buttons
  const block = document.querySelector(`[id="note-${qid}"]`).closest('.q-block');
  block.querySelectorAll('.pf-btn').forEach(b => b.classList.remove('selected'));
  if (val === 'pass') block.querySelectorAll('.pf-btn')[0].classList.add('selected');
  if (val === 'fail') block.querySelectorAll('.pf-btn')[1].classList.add('selected');
  if (val === 'none') block.querySelectorAll('.pf-btn')[2].classList.add('selected');

  // Update score strip
  document.getElementById('score-strip').innerHTML = QUESTIONS.map(q => {
    const v = state[String(currentId)]?.scores?.[q.id] || 'none';
    return `<div class="score-pip ${v}" title="Q${q.id.replace('q','')} ${q.area}">${q.id.replace('q','Q')}</div>`;
  }).join('');

  updateDecisionBanner();
}

function updateDecisionBanner() {
  const d = calcDecision(currentId);
  const s = state[String(currentId)] || {};
  const passes = QUESTIONS.filter(q => s.scores?.[q.id] === 'pass').length;
  const fails = QUESTIONS.filter(q => s.scores?.[q.id] === 'fail').length;
  const nnFails = QUESTIONS.filter(q => q.nn && s.scores?.[q.id] === 'fail').length;
  const answered = passes + fails;

  const banner = document.getElementById('decision-banner');
  const label = document.getElementById('decision-label');
  const detail = document.getElementById('decision-detail');

  banner.className = 'decision-banner ' + (d === 'pending' ? 'pending' : d);
  if (d === 'pending') {
    label.textContent = answered === 0 ? 'Score questions to calculate decision' : `${answered}/7 answered — keep going`;
    detail.textContent = '';
  } else if (d === 'advance') {
    label.textContent = '✓ ADVANCE TO PORTFOLIO REVIEW';
    detail.textContent = `${passes} passes · ${fails} fails · ${nnFails} non-neg fails`;
  } else if (d === 'borderline') {
    label.textContent = '⚠ BORDERLINE — SECOND OPINION REQUIRED';
    detail.textContent = `${passes} passes · ${fails} fails · ${nnFails} non-neg fails`;
  } else if (d === 'decline') {
    label.textContent = nnFails > 0 ? `✕ DECLINE — Non-negotiable fail (Q${QUESTIONS.filter(q=>q.nn&&s.scores?.[q.id]==='fail').map(q=>q.id.replace('q','')).join(', Q')})` : '✕ DECLINE';
    detail.textContent = `${passes} passes · ${fails} fails`;
  }
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  currentId = null;
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('modal')) closeModal();
}

async function saveCandidate() {
  if (!currentId) return;
  if (!state[String(currentId)]) state[String(currentId)] = { status:'Not Contacted', scores:{}, notes:{} };
  state[String(currentId)].status = document.getElementById('modal-status-select').value;
  QUESTIONS.forEach(q => {
    const noteEl = document.getElementById('note-' + q.id);
    if (noteEl) state[String(currentId)].notes[q.id] = noteEl.value;
  });
  state[String(currentId)].decision = calcDecision(currentId);
  state[String(currentId)].updatedBy = recruiterName;
  state[String(currentId)].updatedAt = new Date().toISOString();
  const btn = document.getElementById('save-btn');
  if (btn) btn.textContent = 'Saving…';
  const ok = await saveSingleCandidate(currentId);
  if (ok) {
    closeModal();
    renderPipeline(true);
    renderDashboard();
    showToast(`Saved by ${recruiterName} ✓`);
  } else {
    if (btn) btn.textContent = 'Save';
  }
}

function changeRecruiter() {
  localStorage.removeItem('nr_recruiter_name');
  recruiterName = '';
  ensureRecruiter().then(() => {
    document.getElementById('recruiter-chip').textContent = recruiterName;
  });
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ── INIT ───────────────────────────────────────────────────────────────────
recruiterName = localStorage.getItem('nr_recruiter_name') || '';
ensureRecruiter().then(() => {
  const chip = document.getElementById('recruiter-chip');
  if (chip) chip.textContent = recruiterName;
  loadState().then(() => {
    renderDashboard();
    renderPipeline();
    // Render pipeline again after a short delay to catch any timing issues
    setTimeout(() => renderPipeline(), 300);
  });
});
